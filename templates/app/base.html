<!DOCTYPE html>
<!--
  base.html — Shell principal del CRM FRIGO
  ==========================================
  Todas las páginas internas extienden este template (ver dashboard/index.html).

  Bloques disponibles para las páginas hijas:
    title      — título de la pestaña del navegador
    breadcrumb — texto del módulo activo (ej: "Usuarios & Roles")
    content    — contenido principal de la página
    scripts    — JS específico de cada módulo

  Cómo funciona la autenticación aquí (importante):
    El JWT vive en localStorage del navegador (lo guarda el login).
    Al cargar cualquier página interna, el JS de esta base verifica
    si existe el token. Si no hay → redirige a /login.
    Si hay → decodifica el payload del JWT para mostrar nombre, rol
    y email del usuario en el sidebar sin consultar la BD.

  Java equivalent: Thymeleaf layout con th:fragment="layout"
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM FRIGO{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     ÁREA PRINCIPAL
     ══════════════════════════════════════════════════════════════ -->
<div class="main">

    <!-- Barra superior: breadcrumb + campana + avatar -->
    <header class="topbar">
        <div class="breadcrumb">
            <span class="breadcrumb-root">CRM FRIGO</span>

        <div class="topbar-actions">

                    <path d="M13.73 21a2 2 0 01-3.46 0"/>

            <!-- Avatar: muestra las iniciales del nombre del usuario -->
            <div class="topbar-avatar" id="topbarAvatar">??</div>

    </header>

    <!-- Contenido de cada módulo -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

</div>


<!-- Contenedor de notificaciones toast (esquina inferior derecha) -->
<div class="toast-container" id="toastContainer"></div>


<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT BASE
     Se ejecuta en TODAS las páginas internas.

     ¿Por qué decodificar el JWT en el frontend?
       El token ya contiene name, rol y email firmados por el servidor.
       No tiene sentido hacer una llamada extra a GET /auth/me
       solo para mostrar el nombre en el sidebar.
       Decodificamos el payload (parte central del JWT, base64)
       para leer esos datos directamente.

     Java equivalent: SecurityContextHolder.getContext().getAuthentication()
     ══════════════════════════════════════════════════════════════ -->
<script>
    // ── 1. Guarda de autenticación ────────────────────────────────
    // Si no hay token en localStorage, mandar al login.
    // Esto es el equivalente a un filtro de seguridad en Spring:
    //   OncePerRequestFilter → si no hay sesión, redirigir al login.
    const _token = localStorage.getItem('access_token');
    if (!_token) {
        window.location.href = '/login';
    }

    // ── 2. Decodificar el JWT para leer nombre, rol y email ───────
    // Un JWT tiene 3 partes separadas por puntos: header.payload.signature
    // El payload es JSON codificado en base64 — podemos leerlo sin la clave secreta.
    // La FIRMA sí requiere la clave — el servidor la verifica; el frontend solo lee.
    function decodeJWT(token) {
        try {
            const payload = token.split('.')[1];
            // atob() decodifica base64 → JSON.parse lo convierte a objeto
            return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
        } catch {
            return null;
        }
    }

    const _payload = decodeJWT(_token);

    if (_payload) {
        const rol    = _payload.rol    || localStorage.getItem('rol')    || '';
        const nombre = _payload.nombre || localStorage.getItem('nombre') || '';
        const email  = _payload.email  || '';

        // Llenar el sidebar con los datos del usuario autenticado
        document.getElementById('sidebarUserRole').textContent  = rol;
        document.getElementById('sidebarUserName').textContent  = nombre;
        document.getElementById('sidebarUserEmail').textContent = email;

        // Initiales para el avatar: "Carlos Mendoza" → "CM"
        const initials = nombre.split(' ')
            .map(n => n[0] || '')
            .join('')
            .substring(0, 2)
            .toUpperCase();
        document.getElementById('topbarAvatar').textContent = initials || '?';
    }

    // ── 3. Helper apiFetch ────────────────────────────────────────
    // Envuelve fetch() para adjuntar automáticamente el JWT en cada llamada.
    // Las páginas hijas usan apiFetch() en lugar de fetch() directamente.
    //
    // Java equivalent: RestTemplate / WebClient con interceptor de autenticación
    //   → AuthInterceptor que agrega el header "Authorization: Bearer <token>"
    async function apiFetch(url, options = {}) {
        const token = localStorage.getItem('access_token');
        const res = await fetch(url, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token,
                ...(options.headers || {}),
            },
        });

        // Si el servidor responde 401 (token expirado o inválido):
        // limpiar localStorage y volver al login.
        if (res.status === 401) {
            localStorage.clear();
            window.location.href = '/login';
        }

        return res;
    }

    // ── 4. Notificaciones toast ───────────────────────────────────
    // Muestra un mensaje flotante en la esquina inferior derecha
    // que desaparece automáticamente después de 3.5 segundos.
    function showToast(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = 'toast' + (type === 'error' ? ' error' : '');
        el.textContent = msg;
        document.getElementById('toastContainer').appendChild(el);
        setTimeout(() => el.remove(), 3500);
    }
</script>

{% block scripts %}{% endblock %}

</body>
</html>
